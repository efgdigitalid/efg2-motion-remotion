name: Deploy Preview to GitHub Pages

on:
  workflow_dispatch: {} # bisa dijalankan manual dari tab Actions
  push:
    branches: [main]
    paths:
      - "web-preview/**"
      - "src/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (root + web-preview via workspaces)
        run: npm install

      - name: Build web preview
        run: npm run build --workspace=web-preview

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-preview/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4