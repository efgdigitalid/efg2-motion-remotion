name: Render Motion Graphics

on:
  workflow_dispatch: {} # jalankan manual dari tab "Actions" di GitHub, tombol "Run workflow"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chrome dependencies for Remotion
        run: npx remotion browser ensure

      - name: Batch render semua variasi
        run: npm run batch-render

      - name: Upload hasil render sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-videos
          path: out/*.mp4
          retention-days: 14
